<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>أبو ناقوس | صيانة وتطوير الموقع</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --primary: #ff6b35;
    --primary-dark: #e85d2c;
    --secondary: #8b5cf6;
    --dark: #0f0715;
    --dark-light: #1a1025;
    --gray: #94a3b8;
    --white: #ffffff;
    --gradient-1: linear-gradient(135deg, #ff6b35 0%, #8b5cf6 100%);
}

body {
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #0f0715 0%, #1a1025 100%);
    color: var(--white);
    min-height: 100vh;
}

/* شريط التنقل */
.navbar {
    background: rgba(15, 7, 21, 0.95);
    backdrop-filter: blur(10px);
    padding: 16px 6%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
    border-bottom: 1px solid rgba(255,107,53,0.2);
    position: sticky;
    top: 0;
    z-index: 100;
}

.logo {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo-img {
    width: 48px;
    height: 48px;
    border-radius: 16px;
    background: var(--gradient-1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
}

.logo-text {
    font-size: 22px;
    font-weight: 800;
    background: var(--gradient-1);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.status-badge {
    background: rgba(255,107,53,0.15);
    border: 1px solid var(--primary);
    padding: 6px 18px;
    border-radius: 40px;
    font-size: 13px;
    font-weight: 600;
}

.status-badge i {
    color: var(--primary);
    margin-left: 6px;
}

/* المحتوى الرئيسي */
.main-container {
    max-width: 1100px;
    margin: 60px auto;
    padding: 0 20px;
}

/* بطاقة الصيانة */
.maintenance-card {
    text-align: center;
    margin-bottom: 50px;
}

.badge-icon {
    width: 90px;
    height: 90px;
    background: var(--gradient-1);
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 25px;
    font-size: 42px;
    box-shadow: 0 20px 35px -10px rgba(255,107,53,0.3);
}

.maintenance-card h1 {
    font-size: 48px;
    font-weight: 800;
    margin-bottom: 18px;
}

@media (max-width: 768px) {
    .maintenance-card h1 { font-size: 32px; }
}

.maintenance-card h1 span {
    background: var(--gradient-1);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.coming-soon {
    font-size: 24px;
    color: #f59e0b;
    margin-bottom: 15px;
    font-weight: 700;
}

.sub-text {
    color: var(--gray);
    max-width: 500px;
    margin: 0 auto;
    font-size: 15px;
}

/* عداد */
.countdown-wrapper {
    background: rgba(255,255,255,0.03);
    border-radius: 50px;
    padding: 30px;
    margin: 40px auto;
    max-width: 650px;
}

.countdown-timer {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

.countdown-item {
    text-align: center;
    min-width: 80px;
}

.countdown-number {
    font-size: 45px;
    font-weight: 800;
    background: var(--gradient-1);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    display: block;
    line-height: 1;
}

@media (max-width: 550px) {
    .countdown-number { font-size: 32px; }
    .countdown-item { min-width: 60px; }
}

.countdown-label {
    font-size: 12px;
    color: var(--gray);
    margin-top: 6px;
    display: block;
}

/* شريط التقدم */
.progress-wrapper {
    max-width: 450px;
    margin: 20px auto;
}

.progress-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 13px;
    color: var(--gray);
}

.progress-bar {
    background: rgba(255,255,255,0.1);
    border-radius: 30px;
    height: 6px;
    overflow: hidden;
}

.progress-fill {
    background: var(--gradient-1);
    width: 75%;
    height: 100%;
    border-radius: 30px;
}

/* فريق أبو ناقوس */
.team-section {
    text-align: center;
    margin: 50px 0;
}

.team-card {
    display: inline-block;
    background: rgba(255,255,255,0.03);
    border-radius: 35px;
    padding: 35px 45px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.05);
    transition: 0.3s;
}

.team-card:hover {
    transform: translateY(-5px);
    border-color: var(--primary);
}

.team-avatar {
    width: 100px;
    height: 100px;
    margin: 0 auto 18px;
    background: var(--gradient-1);
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    color: white;
}

.team-name {
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 6px;
}

.team-role {
    font-size: 14px;
    color: var(--primary);
    margin-bottom: 10px;
}

.team-status {
    font-size: 13px;
    color: var(--gray);
}

.team-status i {
    color: #10b981;
    margin-left: 6px;
}

/* أيقونات التواصل */
.social-section {
    text-align: center;
    margin: 45px auto;
}

.social-icons {
    display: flex;
    justify-content: center;
    gap: 20px;
}

.social-icon {
    width: 55px;
    height: 55px;
    background: rgba(255,255,255,0.05);
    border-radius: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.social-icon:hover {
    background: var(--gradient-1);
    transform: translateY(-3px);
}

/* تذييل */
.footer {
    text-align: center;
    padding: 35px;
    border-top: 1px solid rgba(255,255,255,0.05);
    margin-top: 40px;
    font-size: 12px;
    color: var(--gray);
}

/* نقطة سرية */
.secret-access {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 42px;
    height: 42px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
    cursor: pointer;
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
}

.secret-access:hover {
    background: var(--gradient-1);
}
</style>
</head>
<body>

<nav class="navbar">
    <div class="logo">
        <div class="logo-img"><i class="fas fa-crown"></i></div>
        <div class="logo-text">أبو ناقوس</div>
    </div>
    <div class="status-badge">
        <i class="fas fa-sync-alt"></i> تحت الصيانة والتطوير
    </div>
</nav>

<div class="main-container">
    <div class="maintenance-card">
        <div class="badge-icon"><i class="fas fa-tools"></i></div>
        <h1>الموقع <span>تحت الصيانة</span></h1>
        <div class="coming-soon">
            <i class="fas fa-star"></i> القادم أعظم إن شاء الله <i class="fas fa-star"></i>
        </div>
        <p class="sub-text">نقوم بتطوير الموقع بالكامل لنقدم لك تجربة فريدة ومميزة</p>

        <div class="countdown-wrapper">
            <div class="countdown-timer">
                <div class="countdown-item">
                    <span class="countdown-number" id="days">00</span>
                    <span class="countdown-label">أيام</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="hours">00</span>
                    <span class="countdown-label">ساعات</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="minutes">00</span>
                    <span class="countdown-label">دقائق</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="seconds">00</span>
                    <span class="countdown-label">ثواني</span>
                </div>
            </div>
        </div>

        <div class="progress-wrapper">
            <div class="progress-label">
                <span>نسبة الإنجاز</span>
                <span id="progressPercent">75%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width:75%"></div>
            </div>
        </div>
    </div>

    <div class="team-section">
        <div class="team-card">
            <div class="team-avatar"><i class="fas fa-crown"></i></div>
            <div class="team-name">أبو ناقوس</div>
            <div class="team-role">المطور والمصمم الرئيسي</div>
            <div class="team-status"><i class="fas fa-circle"></i> يعمل على تطوير الموقع</div>
        </div>
    </div>

    <div class="social-section">
        <div class="social-icons">
            <a href="https://www.facebook.com/share/14b2shMn3QR/" target="_blank" class="social-icon"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/bdllh.nqws" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
        </div>
    </div>
</div>

<footer class="footer">
    <p>© 2025 أبو ناقوس - جميع الحقوق محفوظة</p>
</footer>

<div class="secret-access" id="secretAccess"><i class="fas fa-key"></i></div>

<script>
    let endDate = new Date();
    endDate.setDate(endDate.getDate() + 5);
    endDate.setHours(0, 0, 0, 0);

    function updateCountdown() {
        let now = new Date();
        let diff = endDate - now;
        if(diff <= 0) {
            document.getElementById('days').innerText = '00';
            document.getElementById('hours').innerText = '00';
            document.getElementById('minutes').innerText = '00';
            document.getElementById('seconds').innerText = '00';
            return;
        }
        let days = Math.floor(diff / (1000*60*60*24));
        let hours = Math.floor((diff % 86400000) / 3600000);
        let minutes = Math.floor((diff % 3600000) / 60000);
        let seconds = Math.floor((diff % 60000) / 1000);
        document.getElementById('days').innerText = days.toString().padStart(2,'0');
        document.getElementById('hours').innerText = hours.toString().padStart(2,'0');
        document.getElementById('minutes').innerText = minutes.toString().padStart(2,'0');
        document.getElementById('seconds').innerText = seconds.toString().padStart(2,'0');
        let progress = ((5-days)/5)*100;
        document.getElementById('progressFill').style.width = progress + '%';
        document.getElementById('progressPercent').innerText = Math.floor(progress) + '%';
    }
    setInterval(updateCountdown, 1000);
    updateCountdown();

    let clickCount = 0, clickTimer;
    document.getElementById('secretAccess').onclick = () => {
        clickCount++;
        clearTimeout(clickTimer);
        if(clickCount >= 5) {
            window.location.href = "admin.html";
            clickCount = 0;
        }
        clickTimer = setTimeout(() => clickCount = 0, 800);
    };
</script>
</body>
</html>
