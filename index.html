<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>أبو ناقوس | صيانة وتطوير الموقع</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --primary: #ff6b35;
    --primary-dark: #e85d2c;
    --secondary: #8b5cf6;
    --dark: #0a0a0f;
    --dark-light: #1a1a2e;
    --gray: #94a3b8;
    --white: #ffffff;
    --gradient-1: linear-gradient(135deg, #ff6b35 0%, #8b5cf6 100%);
    --gradient-2: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
    --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.1);
    --shadow-md: 0 10px 25px -5px rgba(0,0,0,0.1);
    --shadow-lg: 0 25px 50px -12px rgba(0,0,0,0.25);
    --shadow-xl: 0 35px 60px -15px rgba(0,0,0,0.3);
}

body {
    font-family: 'Cairo', sans-serif;
    background: var(--gradient-2);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
}

/* خلفية متحركة حديثة */
.bg-modern {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    overflow: hidden;
}

.blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.4;
    animation: floatBlob 20s infinite ease-in-out;
}

.blob-1 {
    width: 400px;
    height: 400px;
    background: #ff6b35;
    top: -100px;
    right: -100px;
    animation-delay: 0s;
}

.blob-2 {
    width: 500px;
    height: 500px;
    background: #8b5cf6;
    bottom: -150px;
    left: -150px;
    animation-delay: -5s;
}

.blob-3 {
    width: 300px;
    height: 300px;
    background: #06b6d4;
    top: 50%;
    left: 30%;
    animation-delay: -10s;
}

@keyframes floatBlob {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(50px, -50px) scale(1.1); }
}

/* شريط التنقل */
.navbar {
    position: relative;
    z-index: 10;
    background: rgba(10, 10, 15, 0.8);
    backdrop-filter: blur(20px);
    padding: 18px 6%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.logo {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo-img {
    width: 50px;
    height: 50px;
    border-radius: 16px;
    object-fit: cover;
}

.logo-text {
    font-size: 24px;
    font-weight: 800;
    background: var(--gradient-1);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.status-badge {
    background: rgba(255,107,53,0.15);
    border: 1px solid var(--primary);
    padding: 8px 20px;
    border-radius: 40px;
    font-size: 13px;
    font-weight: 600;
}

.status-badge i {
    color: var(--primary);
    margin-left: 8px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
}

/* المحتوى الرئيسي */
.main-container {
    position: relative;
    z-index: 10;
    max-width: 1100px;
    margin: 80px auto;
    padding: 0 24px;
}

/* بطاقة الصيانة */
.maintenance-card {
    text-align: center;
    margin-bottom: 60px;
}

.badge-icon {
    width: 100px;
    height: 100px;
    background: var(--gradient-1);
    border-radius: 35px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 30px;
    font-size: 48px;
    box-shadow: var(--shadow-xl);
}

.maintenance-card h1 {
    font-size: 56px;
    font-weight: 800;
    margin-bottom: 20px;
}

@media (max-width: 768px) {
    .maintenance-card h1 { font-size: 36px; }
}

.maintenance-card h1 span {
    background: var(--gradient-1);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.coming-soon {
    font-size: 28px;
    color: #f59e0b;
    margin-bottom: 20px;
    font-weight: 700;
}

.sub-text {
    color: var(--gray);
    max-width: 550px;
    margin: 0 auto;
    font-size: 16px;
}

/* عداد فقط */
.countdown-wrapper {
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(10px);
    border-radius: 60px;
    padding: 35px;
    margin: 45px auto;
    max-width: 700px;
    border: 1px solid rgba(255,255,255,0.05);
}

.countdown-timer {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
}

.countdown-item {
    text-align: center;
}

.countdown-number {
    font-size: 48px;
    font-weight: 800;
    background: var(--gradient-1);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    display: block;
    line-height: 1;
}

@media (max-width: 550px) {
    .countdown-number { font-size: 32px; }
    .countdown-timer { gap: 15px; }
}

.countdown-label {
    font-size: 13px;
    color: var(--gray);
    margin-top: 8px;
    display: block;
}

/* شريط التقدم البسيط */
.progress-wrapper {
    max-width: 500px;
    margin: 30px auto;
}

.progress-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    font-size: 13px;
    color: var(--gray);
}

.progress-bar {
    background: rgba(255,255,255,0.1);
    border-radius: 30px;
    height: 6px;
    overflow: hidden;
}

.progress-fill {
    background: var(--gradient-1);
    width: 75%;
    height: 100%;
    border-radius: 30px;
}

/* فريق أبو ناقوس */
.team-section {
    margin: 60px 0;
    text-align: center;
}

.team-card {
    display: inline-block;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(10px);
    border-radius: 40px;
    padding: 40px 50px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.05);
    transition: all 0.3s ease;
}

.team-card:hover {
    transform: translateY(-5px);
    border-color: var(--primary);
    box-shadow: var(--shadow-lg);
}

.team-avatar {
    width: 120px;
    height: 120px;
    margin: 0 auto 20px;
    background: var(--gradient-1);
    border-radius: 35px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 55px;
    color: white;
}

.team-name {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 8px;
}

.team-role {
    font-size: 15px;
    color: var(--primary);
    margin-bottom: 12px;
}

.team-status {
    font-size: 13px;
    color: var(--gray);
}

.team-status i {
    color: #10b981;
    margin-left: 6px;
}

/* أيقونات التواصل */
.social-section {
    text-align: center;
    margin: 50px auto;
}

.social-icons {
    display: flex;
    justify-content: center;
    gap: 25px;
}

.social-icon {
    width: 60px;
    height: 60px;
    background: rgba(255,255,255,0.05);
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: white;
    text-decoration: none;
    transition: all 0.3s ease;
    border: 1px solid rgba(255,255,255,0.05);
}

.social-icon:hover {
    background: var(--gradient-1);
    transform: translateY(-5px);
    border-color: transparent;
}

/* تذييل */
.footer {
    text-align: center;
    padding: 40px;
    border-top: 1px solid rgba(255,255,255,0.05);
    margin-top: 50px;
    font-size: 13px;
    color: var(--gray);
}

/* نقطة سرية */
.secret-access {
    position: fixed;
    bottom: 25px;
    right: 25px;
    width: 45px;
    height: 45px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
    cursor: pointer;
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.1);
}

.secret-access:hover {
    background: var(--gradient-1);
    transform: rotate(15deg);
}
</style>
</head>
<body>

<div class="bg-modern">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<nav class="navbar">
    <div class="logo">
        <img src="https://placehold.co/200x200/ff6b35/white?text=ن" alt="شعار أبو ناقوس" class="logo-img">
        <div class="logo-text">أبو ناقوس</div>
    </div>
    <div class="status-badge">
        <i class="fas fa-sync-alt"></i> تحت الصيانة والتطوير
    </div>
</nav>

<div class="main-container">
    <div class="maintenance-card">
        <div class="badge-icon"><i class="fas fa-tools"></i></div>
        <h1>الموقع <span>تحت الصيانة</span></h1>
        <div class="coming-soon">
            <i class="fas fa-star"></i> القادم أعظم إن شاء الله <i class="fas fa-star"></i>
        </div>
        <p class="sub-text">نقوم بتطوير الموقع بالكامل لنقدم لك تجربة فريدة ومميزة</p>

        <!-- عداد فقط -->
        <div class="countdown-wrapper">
            <div class="countdown-timer">
                <div class="countdown-item">
                    <span class="countdown-number" id="days">00</span>
                    <span class="countdown-label">أيام</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="hours">00</span>
                    <span class="countdown-label">ساعات</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="minutes">00</span>
                    <span class="countdown-label">دقائق</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="seconds">00</span>
                    <span class="countdown-label">ثواني</span>
                </div>
            </div>
        </div>

        <!-- شريط التقدم البسيط -->
        <div class="progress-wrapper">
            <div class="progress-label">
                <span>نسبة الإنجاز</span>
                <span id="progressPercent">75%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width:75%"></div>
            </div>
        </div>
    </div>

    <!-- فريق أبو ناقوس -->
    <div class="team-section">
        <div class="team-card">
            <div class="team-avatar"><i class="fas fa-crown"></i></div>
            <div class="team-name">أبو ناقوس</div>
            <div class="team-role">المطور والمصمم الرئيسي</div>
            <div class="team-status"><i class="fas fa-circle"></i> يعمل على تطوير الموقع</div>
        </div>
    </div>

    <!-- أيقونات التواصل -->
    <div class="social-section">
        <div class="social-icons">
            <a href="https://www.facebook.com/share/14b2shMn3QR/" target="_blank" class="social-icon"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/bdllh.nqws" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
        </div>
    </div>
</div>

<footer class="footer">
    <p>© 2025 أبو ناقوس - جميع الحقوق محفوظة</p>
</footer>

<div class="secret-access" id="secretAccess"><i class="fas fa-key"></i></div>

<script>
    // عداد 5 أيام
    let endDate = new Date();
    endDate.setDate(endDate.getDate() + 5);
    endDate.setHours(0, 0, 0, 0);

    function updateCountdown() {
        let now = new Date();
        let diff = endDate - now;
        if(diff <= 0) {
            document.getElementById('days').innerText = '00';
            document.getElementById('hours').innerText = '00';
            document.getElementById('minutes').innerText = '00';
            document.getElementById('seconds').innerText = '00';
            return;
        }
        let days = Math.floor(diff / (1000*60*60*24));
        let hours = Math.floor((diff % 86400000) / 3600000);
        let minutes = Math.floor((diff % 3600000) / 60000);
        let seconds = Math.floor((diff % 60000) / 1000);
        document.getElementById('days').innerText = days.toString().padStart(2,'0');
        document.getElementById('hours').innerText = hours.toString().padStart(2,'0');
        document.getElementById('minutes').innerText = minutes.toString().padStart(2,'0');
        document.getElementById('seconds').innerText = seconds.toString().padStart(2,'0');
        let progress = ((5-days)/5)*100;
        document.getElementById('progressFill').style.width = progress + '%';
        document.getElementById('progressPercent').innerText = Math.floor(progress) + '%';
    }
    setInterval(updateCountdown, 1000);
    updateCountdown();

    // نقطة سرية
    let clickCount = 0, clickTimer;
    document.getElementById('secretAccess').onclick = () => {
        clickCount++;
        clearTimeout(clickTimer);
        if(clickCount >= 5) {
            window.location.href = "admin.html";
            clickCount = 0;
        }
        clickTimer = setTimeout(() => clickCount = 0, 800);
    };
</script>
</body>
</html>
