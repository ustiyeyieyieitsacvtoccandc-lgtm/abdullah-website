<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرابيسك | تحت التطوير</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;900&family=Orbitron:wght@900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
    
    <style>
        :root {
            --main-cyan: #00f2ff;
            --main-purple: #bc13fe;
            --bg-deep: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-deep);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #canvas-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            filter: blur(1px);
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
            z-index: 0;
        }

        .main-content {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .status-bar {
            font-size: 1.2rem;
            letter-spacing: 10px;
            color: var(--main-purple);
            text-shadow: 0 0 10px var(--main-purple);
            margin-bottom: 10px;
            animation: blink 1.5s infinite;
            font-weight: bold;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        .title-container h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(4rem, 18vw, 9rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -5px;
            background: linear-gradient(90deg, #fff, var(--main-cyan), var(--main-purple), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .timer-capsule {
            display: flex;
            gap: 20px;
            margin: 40px 0;
            background: rgba(255, 255, 255, 0.03);
            padding: 30px 60px;
            border-radius: 100px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .t-unit b {
            display: block;
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            color: var(--main-cyan);
            text-shadow: 0 0 20px var(--main-cyan);
        }

        .t-unit span {
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .bomb-text {
            font-size: 2.2rem;
            font-weight: 900;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            color: #fff;
        }

        .bomb-icon {
            color: #ff3c00;
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            75% { transform: rotate(-10deg); }
        }

        .launch-day {
            font-size: 2.5rem;
            color: var(--main-cyan);
            font-weight: 900;
            margin: 20px 0;
            text-shadow: 0 0 15px var(--main-cyan);
        }

        .cyber-line {
            width: 300px; height: 2px;
            background: linear-gradient(90deg, transparent, var(--main-cyan), transparent);
            margin: 30px auto;
        }

    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>
    <div class="overlay"></div>

    <div class="main-content">
        <div class="status-bar" data-aos="fade-down">الموقع تحت التطوير</div>
        
        <div class="title-container" data-aos="zoom-in">
            <h1>ARABESQUE</h1>
        </div>

        <div class="launch-day" data-aos="fade-up">الخميس الانطلاق</div>

        <div class="timer-capsule" data-aos="fade-up" data-aos-delay="400">
            <div class="t-unit"><b id="d">00</b><span>يوم</span></div>
            <div class="t-unit"><b id="h">00</b><span>ساعة</span></div>
            <div class="t-unit"><b id="m">00</b><span>دقيقة</span></div>
            <div class="t-unit"><b id="s">00</b><span>ثانية</span></div>
        </div>

        <div class="bomb-text" data-aos="fade-up" data-aos-delay="600">
            <i class="fas fa-bomb bomb-icon"></i>
            قنبلة البرمجة القادمة
        </div>

        <div class="cyber-line"></div>
        
        <p style="font-size: 1.5rem; font-weight: 900; letter-spacing: 5px; color: #888;" data-aos="fade-in" data-aos-delay="800">
            القادم أعظم
        </p>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const dots = [];
        for(let i=0; i<150; i++) {
            dots.push({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5
            });
        }

        function draw() {
            ctx.clearRect(0,0,width,height);
            ctx.fillStyle = "rgba(0, 242, 255, 0.5)";
            
            dots.forEach(d => {
                d.x += d.vx;
                d.y += d.vy;
                if(d.x < 0 || d.x > width) d.vx *= -1;
                if(d.y < 0 || d.y > height) d.vy *= -1;
                
                ctx.beginPath();
                ctx.arc(d.x, d.y, 1.5, 0, Math.PI*2);
                ctx.fill();
                
                dots.forEach(d2 => {
                    let dist = Math.hypot(d.x - d2.x, d.y - d2.y);
                    if(dist < 150) {
                        ctx.strokeStyle = `rgba(188, 19, 254, ${1 - dist/150})`;
                        ctx.lineWidth = 0.2;
                        ctx.beginPath();
                        ctx.moveTo(d.x, d.y);
                        ctx.lineTo(d2.x, d2.y);
                        ctx.stroke();
                    }
                });
            });
            requestAnimationFrame(draw);
        }
        draw();

        function updateTimer() {
            // تحديد موعد الانطلاق (الخميس القادم)
            let now = new Date();
            let target = new Date();
            target.setDate(now.getDate() + (4 - now.getDay() + 7) % 7);
            target.setHours(0, 0, 0, 0);

            let diff = target - now;
            if (diff < 0) {
                target.setDate(target.getDate() + 7);
                diff = target - now;
            }

            document.getElementById('d').innerText = Math.floor(diff / 86400000).toString().padStart(2, '0');
            document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000).toString().padStart(2, '0');
            document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            document.getElementById('s').innerText = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
