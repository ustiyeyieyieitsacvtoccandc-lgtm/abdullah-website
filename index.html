<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أبو ناقوس | التقنية بأبهى صورها</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --accent: #00ffcc;
            --main-purple: #7000ff;
            --bg: #030303;
            --card-glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; } /* Cursor hidden for custom one */

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: #fff;
            overflow-x: hidden;
        }

        /* الماوس المخصص */
        .cursor {
            width: 10px; height: 10px; background: var(--accent); border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9999; transition: transform 0.1s;
        }
        .cursor-follower {
            width: 30px; height: 30px; border: 1px solid var(--accent); border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9998; transition: transform 0.2s;
        }

        /* إضاءة خلفية متحركة */
        .blob {
            position: fixed; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(112,0,255,0.2) 0%, transparent 70%);
            top: -100px; left: -100px; z-index: -1; animation: move 15s infinite alternate;
        }

        @keyframes move { from { transform: translate(0,0); } to { transform: translate(100vw, 100vh); } }

        /* Navbar */
        nav {
            padding: 30px 10%; display: flex; justify-content: space-between; align-items: center;
            position: fixed; width: 100%; top: 0; z-index: 100;
            background: rgba(3,3,3,0.8); backdrop-filter: blur(10px);
        }

        .logo { font-size: 28px; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        /* Hero Section */
        .hero {
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
        }

        .hero h1 { font-size: clamp(40px, 8vw, 90px); font-weight: 900; line-height: 1; }
        .typewriter { color: var(--accent); }

        /* البطاقات الثلاثية الأبعاد */
        .services { padding: 100px 10%; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }

        .service-card {
            background: var(--card-glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 50px 30px; border-radius: 30px;
            transform-style: preserve-3d;
            transition: 0.1s;
            text-align: center;
        }

        .service-card i { font-size: 50px; color: var(--accent); margin-bottom: 20px; transform: translateZ(30px); }
        .service-card h3 { transform: translateZ(50px); margin-bottom: 15px; }

        /* الأزرار */
        .btn-modern {
            padding: 18px 45px; background: transparent; border: 1px solid var(--accent);
            color: var(--accent); font-weight: 700; border-radius: 10px;
            text-decoration: none; position: relative; overflow: hidden; transition: 0.4s;
        }

        .btn-modern:hover { background: var(--accent); color: #000; box-shadow: 0 0 30px var(--accent); }

        /* تواصل معي */
        .social-box { margin-top: 50px; display: flex; gap: 20px; }
        .social-box a {
            width: 50px; height: 50px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 20px; transition: 0.3s;
        }
        .social-box a:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-5px); }

        @media (max-width: 768px) { * { cursor: auto; } .cursor, .cursor-follower { display: none; } }
    </style>
</head>
<body>

    <div class="cursor"></div>
    <div class="cursor-follower"></div>
    <div class="blob"></div>

    <nav>
        <div class="logo">أبو <span>ناقوس</span></div>
        <div class="social-box" style="margin: 0;">
            <a href="https://www.facebook.com/share/191DRXcdf6/" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/bdllh.nqws" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
    </nav>

    <section class="hero">
        <div data-aos="fade-up">
            <h1 id="hero-title">أنا <span class="typewriter"></span></h1>
            <p style="color: #888; margin: 20px 0 40px; font-size: 20px;">أصمم وأبني تجارب رقمية خارج حدود الخيال</p>
            <a href="https://wa.me/0779418419" class="btn-modern">اطلب مشروعك الآن</a>
        </div>
    </section>

    <section class="services">
        <div class="service-card" data-tilt data-tilt-max="15" data-aos="zoom-in">
            <i class="fas fa-code"></i>
            <h3>برمجة متكاملة</h3>
            <p>حلول برمجية مخصصة بأحدث لغات البرمجة العالمية.</p>
        </div>
        <div class="service-card" data-tilt data-tilt-max="15" data-aos="zoom-in" data-aos-delay="100">
            <i class="fas fa-paint-brush"></i>
            <h3>تصميم إبداعي</h3>
            <p>واجهات مستخدم UI/UX تجعل موقعك ينبض بالحياة.</p>
        </div>
        <div class="service-card" data-tilt data-tilt-max="15" data-aos="zoom-in" data-aos-delay="200">
            <i class="fas fa-rocket"></i>
            <h3>سرعة وأداء</h3>
            <p>تطوير مواقع فائقة السرعة مهيأة لمحركات البحث.</p>
        </div>
    </section>

    <footer style="text-align: center; padding: 50px; border-top: 1px solid rgba(255,255,255,0.05);">
        <p style="color: #555;">© 2026 أبو ناقوس - مطور مواقع محترف</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>

    <script>
        AOS.init({ duration: 1200 });

        // تأثير الكتابة
        new Typed('.typewriter', {
            strings: ['أبو ناقوس', 'مبرمج محترف', 'مصمم واجهات', 'مبتكر حلول'],
            typeSpeed: 70,
            backSpeed: 40,
            loop: true
        });

        // الماوس المخصص
        const cursor = document.querySelector('.cursor');
        const follower = document.querySelector('.cursor-follower');
        document.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
            follower.style.transform = `translate(${e.clientX - 10}px, ${e.clientY - 10}px)`;
        });

        // تأثير تكبير الماوس عند الروابط
        document.querySelectorAll('a, .service-card').forEach(link => {
            link.onmouseenter = () => follower.style.transform += ' scale(2.5)';
            link.onmouseleave = () => follower.style.transform += ' scale(1)';
        });
    </script>
</body>
</html>
