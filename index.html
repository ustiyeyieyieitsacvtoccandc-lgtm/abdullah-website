<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <title>أربكس البرمجة | السيمفونية الرقمية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-cyan: #00f7ff;
            --primary-purple: #b000ff;
            --dark-deep: #05050f;
            --neon-glow-cyan: 0 0 15px rgba(0, 247, 255, 0.8), 0 0 30px rgba(0, 247, 255, 0.4);
            --transition-smooth: all 0.5s cubic-bezier(0.2, 0.95, 0.4, 1.1);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--dark-deep);
            color: #eef5ff;
            overflow-x: hidden;
            cursor: none;
        }

        /* Custom Cursor */
        .cursor-dot, .cursor-outline {
            pointer-events: none; position: fixed; top: 0; left: 0;
            border-radius: 50%; z-index: 9999; transform: translate(-50%, -50%);
        }
        .cursor-dot { width: 8px; height: 8px; background-color: var(--primary-cyan); box-shadow: var(--neon-glow-cyan); }
        .cursor-outline { width: 40px; height: 40px; border: 1px solid rgba(0, 247, 255, 0.5); transition: all 0.15s ease-out; }

        #three-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; opacity: 0.8; }

        .glass-nav {
            position: fixed; top: 25px; right: 5%; left: 5%;
            padding: 0.8rem 2rem; display: flex; justify-content: space-between; align-items: center;
            background: rgba(5, 5, 15, 0.65); backdrop-filter: blur(25px);
            border-radius: 80px; border: 1px solid rgba(0, 247, 255, 0.5); z-index: 1000;
        }

        .logo {
            font-family: 'Orbitron', monospace; font-size: 1.8rem; font-weight: 900;
            background: linear-gradient(135deg, #ffffff, var(--primary-cyan), var(--primary-purple));
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }

        .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 8rem 6% 4rem; }
        .hero h1 { font-size: clamp(2.5rem, 6vw, 5rem); font-weight: 900; line-height: 1.1; margin-bottom: 1.5rem; }
        .hero-gradient-text { background: linear-gradient(135deg, #fff, var(--primary-cyan), #ff66ff); -webkit-background-clip: text; color: transparent; }

        .section-premium { padding: 6rem 8%; position: relative; z-index: 2; }
        
        /* Message Box */
        .cyber-card {
            max-width: 600px; margin: 0 auto; background: rgba(10, 10, 26, 0.8);
            backdrop-filter: blur(20px); border-radius: 40px; padding: 3rem;
            border: 1px solid var(--primary-cyan); box-shadow: var(--neon-glow-cyan);
        }

        .cyber-input {
            width: 100%; padding: 15px; background: rgba(0, 247, 255, 0.05);
            border: 1px solid var(--primary-cyan); border-radius: 15px;
            color: white; font-family: 'Cairo'; margin-bottom: 1.2rem; outline: none;
        }

        .btn-cyber {
            background: linear-gradient(95deg, #00e5ff, #9b4dff);
            padding: 1rem 2.5rem; border-radius: 60px; font-weight: 800; color: #000;
            text-decoration: none; display: inline-flex; align-items: center; gap: 12px;
            transition: 0.3s; border: none; cursor: pointer; width: 100%; justify-content: center;
        }
        .btn-cyber:hover { transform: scale(1.05); color: white; box-shadow: 0 0 35px var(--primary-cyan); }

        footer { text-align: center; padding: 3rem; background: rgba(0,0,0,0.9); border-top: 1px solid var(--primary-cyan); }
    </style>
</head>
<body>

<div id="three-canvas"></div>
<div class="cursor-dot"></div>
<div class="cursor-outline"></div>

<nav class="glass-nav">
    <div class="logo">✦ ARABESQUE_AI ✦</div>
</nav>

<section class="hero">
    <div data-aos="fade-up">
        <h1>أربكس البرمجة<br><span class="hero-gradient-text">سيمفونية الغد الرقمية</span></h1>
        <p style="font-size: 1.2rem; color: #d0e2ff;">نبني واقعاً موازياً من الإبداع التكنولوجي</p>
    </div>
</section>

<section class="section-premium">
    <div class="cyber-card" data-aos="zoom-in">
        <h2 style="text-align: center; margin-bottom: 2rem; font-family: 'Orbitron';">📡 قناة الاتصال المباشر</h2>
        
        <input type="text" id="userName" class="cyber-input" placeholder="اسمك الكريم...">
        <input type="text" id="userContact" class="cyber-input" placeholder="رقم هاتفك أو حسابك...">
        <textarea id="devMessage" class="cyber-input" placeholder="اكتب رسالتك هنا..." rows="4"></textarea>
        
        <button onclick="sendToDev()" class="btn-cyber">
            <i class="fas fa-paper-plane"></i> بـث الرسالـة الآن
        </button>
    </div>
</section>

<footer>
    <p>© 2026 أربكس البرمجة — جميع الحقوق محفوظة</p>
</footer>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } } </script>

<script type="module">
    import * as THREE from 'three';
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('three-canvas').appendChild(renderer.domElement);
    
    const geometry = new THREE.TorusKnotGeometry(10, 3, 100, 16);
    const material = new THREE.MeshBasicMaterial({ color: 0x00f7ff, wireframe: true });
    const knot = new THREE.Mesh(geometry, material);
    scene.add(knot);
    camera.position.z = 30;

    function animate() {
        requestAnimationFrame(animate);
        knot.rotation.x += 0.01; knot.rotation.y += 0.01;
        renderer.render(scene, camera);
    }
    animate();
</script>

<script>
    AOS.init();

    // الكرسر المخصص
    const dot = document.querySelector('.cursor-dot');
    const out = document.querySelector('.cursor-outline');
    window.addEventListener('mousemove', (e) => {
        dot.style.left = out.style.left = e.clientX + 'px';
        dot.style.top = out.style.top = e.clientY + 'px';
    });

    // وظيفة الإرسال الأصلية والمضمونة
    function sendToDev() {
        const name = document.getElementById('userName').value;
        const contact = document.getElementById('userContact').value;
        const msg = document.getElementById('devMessage').value;

        if (!msg.trim()) {
            alert("أدخل رسالة أولاً!");
            return;
        }

        const fullMessage = `👤 الاسم: ${name || 'غير معروف'}\n📞 التواصل: ${contact || 'لم يذكر'}\n\n💬 الرسالة:\n${msg}`;

        // الإرسال للقناة التي تعمل عندك حالياً
        fetch('https://ntfy.sh/abdullah_dev_2026', {
            method: 'POST',
            body: fullMessage,
            headers: {
                'Title': '📡 رسالة جديدة من أربكس',
                'Priority': 'high',
                'Tags': 'incoming_envelope'
            }
        }).then(response => {
            if (response.ok) {
                alert("تـم بـث الرسالـة بنجاح! تفقد هاتفك الآن.");
                document.getElementById('userName').value = "";
                document.getElementById('userContact').value = "";
                document.getElementById('devMessage').value = "";
            } else {
                alert("فشل الإرسال، حاول لاحقاً.");
            }
        }).catch(err => {
            alert("حدث خطأ في الاتصال بالشبكة.");
        });
    }
</script>
</body>
</html>
