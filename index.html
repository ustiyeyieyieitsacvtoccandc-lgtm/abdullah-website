<script type="module">
    import * as THREE from 'three';
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(2, 1.5, 10);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('three-canvas').appendChild(renderer.domElement);
    const knot = new THREE.Mesh(new THREE.TorusKnotGeometry(1.5, 0.35, 300, 48), new THREE.MeshStandardMaterial({ color: 0x00f7ff, wireframe: true }));
    scene.add(knot);
    scene.add(new THREE.AmbientLight(0x404040));
    const light = new THREE.PointLight(0xffffff, 1);
    light.position.set(5, 5, 5);
    scene.add(light);
    function animate() { requestAnimationFrame(animate); knot.rotation.y += 0.01; renderer.render(scene, camera); }
    animate();
</script>
